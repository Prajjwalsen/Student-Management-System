<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System - Add Student</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-graduation-cap"></i> SMS</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="{{ url_for('dashboard') }}" class="nav-link">
                    <i class="fas fa-dashboard"></i> Dashboard
                </a>
                <a href="{{ url_for('students') }}" class="nav-link">
                    <i class="fas fa-users"></i> Students
                </a>
                <a href="{{ url_for('add_student') }}" class="nav-link active">
                    <i class="fas fa-user-plus"></i> Add Student
                </a>
                <a href="{{ url_for('analytics') }}" class="nav-link">
                    <i class="fas fa-chart-bar"></i> Analytics
                </a>
                <a href="{{ url_for('fees') }}" class="nav-link">
                    <i class="fas fa-dollar-sign"></i> Fees
                </a>
                <a href="{{ url_for('assignments') }}" class="nav-link">
                    <i class="fas fa-tasks"></i> Assignments
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Navbar -->
            <header class="top-navbar">
                <div class="navbar-content">
                    <h1>Add New Student</h1>
                    <div class="navbar-actions">
                        <a href="{{ url_for('students') }}" class="btn-secondary">
                            <i class="fas fa-arrow-left"></i> Back to Students
                        </a>
                        <span class="user-info">
                            <i class="fas fa-user-circle"></i> {{ session.get('username', 'Admin') }}
                        </span>
                        <form method="POST" action="{{ url_for('logout') }}" style="display: inline;">
                            <button type="submit" class="btn-secondary">
                                <i class="fas fa-sign-out-alt"></i> Logout
                            </button>
                        </form>
                    </div>
                </div>
            </header>

            <!-- Add Student Content -->
            <div class="add-student-content p-20">
                {% if success_message %}
                <div class="notification notification-success show">
                    <div class="notification-content">
                        <i class="fas fa-check-circle"></i>
                        <span>{{ success_message }}</span>
                    </div>
                </div>
                {% endif %}

                <div class="form-container">
                    <form id="add-student-form">
                        <!-- Personal Information -->
                        <div class="form-section">
                            <h3><i class="fas fa-user"></i> Personal Information</h3>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="student-id">Student ID:</label>
                                    <input type="text" id="student-id" name="student_id" required>
                                </div>
                                <div class="form-group">
                                    <label for="first-name">First Name:</label>
                                    <input type="text" id="first-name" name="first_name" required>
                                </div>
                                <div class="form-group">
                                    <label for="last-name">Last Name:</label>
                                    <input type="text" id="last-name" name="last_name" required>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="date-of-birth">Date of Birth:</label>
                                    <input type="date" id="date-of-birth" name="date_of_birth">
                                </div>
                                <div class="form-group">
                                    <label for="email">Email:</label>
                                    <input type="email" id="email" name="email">
                                </div>
                                <div class="form-group">
                                    <label for="phone">Phone:</label>
                                    <input type="tel" id="phone" name="phone">
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group full-width">
                                    <label for="address">Address:</label>
                                    <textarea id="address" name="address" rows="3"></textarea>
                                </div>
                            </div>
                        </div>

                        <!-- Academic Information -->
                        <div class="form-section">
                            <h3><i class="fas fa-graduation-cap"></i> Academic Information</h3>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="department">Department:</label>
                                    <select id="department" name="department" required>
                                        <option value="">Select Department</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="course">Course:</label>
                                    <input type="text" id="course" name="course" required>
                                </div>
                                <div class="form-group">
                                    <label for="semester">Semester:</label>
                                    <select id="semester" name="semester" required>
                                        <option value="">Select Semester</option>
                                        <option value="1">Semester 1</option>
                                        <option value="2">Semester 2</option>
                                        <option value="3">Semester 3</option>
                                        <option value="4">Semester 4</option>
                                        <option value="5">Semester 5</option>
                                        <option value="6">Semester 6</option>
                                        <option value="7">Semester 7</option>
                                        <option value="8">Semester 8</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="enrollment-year">Enrollment Year:</label>
                                    <input type="number" id="enrollment-year" name="enrollment_year" min="2000" max="2030" value="{{ current_year }}">
                                </div>
                                <div class="form-group">
                                    <label for="building-block">Building Block:</label>
                                    <input type="text" id="building-block" name="building_block" required>
                                </div>
                                <div class="form-group">
                                    <label for="cgpa">CGPA:</label>
                                    <input type="number" id="cgpa" name="cgpa" step="0.01" min="0" max="10" required>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="attendance">Attendance (%):</label>
                                    <input type="number" id="attendance" name="attendance_percentage" min="0" max="100" required>
                                </div>
                                <div class="form-group">
                                    <label for="fees-status">Fees Status:</label>
                                    <select id="fees-status" name="fees_status" required>
                                        <option value="Paid">Paid</option>
                                        <option value="Pending">Pending</option>
                                        <option value="Partial">Partial</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="button" class="btn-secondary" onclick="clearForm()">
                                <i class="fas fa-times"></i> Clear
                            </button>
                            <button type="submit" class="btn-primary">
                                <i class="fas fa-save"></i> Add Student
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadDepartments();
            
            // Set current year as default
            document.getElementById('enrollment-year').value = new Date().getFullYear();
            
            // Form submission
            document.getElementById('add-student-form').addEventListener('submit', function(e) {
                e.preventDefault();
                addStudent();
            });
        });

        function clearForm() {
            if (confirm('Are you sure you want to clear all form fields?')) {
                document.getElementById('add-student-form').reset();
                document.getElementById('enrollment-year').value = new Date().getFullYear();
                showNotification('Form cleared', 'info');
            }
        }
    </script>

    <style>
        .add-student-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .form-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        .form-section {
            margin-bottom: 40px;
        }

        .form-section h3 {
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e1e8ed;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e8ed;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .form-actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e1e8ed;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .form-actions {
                flex-direction: column;
            }
            
            .add-student-content {
                padding: 10px;
            }
            
            .form-container {
                padding: 20px;
            }
        }
    </style>
</body>
</html>
