<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System - Fees</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-graduation-cap"></i> SMS</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="{{ url_for('dashboard') }}" class="nav-link">
                    <i class="fas fa-dashboard"></i> Dashboard
                </a>
                <a href="{{ url_for('students') }}" class="nav-link">
                    <i class="fas fa-users"></i> Students
                </a>
                <a href="{{ url_for('add_student') }}" class="nav-link">
                    <i class="fas fa-user-plus"></i> Add Student
                </a>
                <a href="{{ url_for('analytics') }}" class="nav-link">
                    <i class="fas fa-chart-bar"></i> Analytics
                </a>
                <a href="{{ url_for('fees') }}" class="nav-link active">
                    <i class="fas fa-dollar-sign"></i> Fees
                </a>
                <a href="{{ url_for('assignments') }}" class="nav-link">
                    <i class="fas fa-tasks"></i> Assignments
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Navbar -->
            <header class="top-navbar">
                <div class="navbar-content">
                    <h1>Fees Management</h1>
                    <div class="navbar-actions">
                        <span class="user-info">
                            <i class="fas fa-user-circle"></i> {{ session.get('username', 'Admin') }}
                        </span>
                        <form method="POST" action="{{ url_for('logout') }}" style="display: inline;">
                            <button type="submit" class="btn-secondary">
                                <i class="fas fa-sign-out-alt"></i> Logout
                            </button>
                        </form>
                    </div>
                </div>
            </header>

            <!-- Fees Content -->
            <div class="fees-content p-20">
                <div class="stats-grid">
                    <div class="stat-card green">
                        <div class="stat-icon">
                            <i class="fas fa-dollar-sign"></i>
                        </div>
                        <div class="stat-content">
                            <h3 id="paid-fees">0</h3>
                            <p>Paid Fees</p>
                        </div>
                    </div>
                    <div class="stat-card orange">
                        <div class="stat-icon">
                            <i class="fas fa-clock"></i>
                        </div>
                        <div class="stat-content">
                            <h3 id="pending-fees">0</h3>
                            <p>Pending Fees</p>
                        </div>
                    </div>
                    <div class="stat-card blue">
                        <div class="stat-icon">
                            <i class="fas fa-exclamation-triangle"></i>
                        </div>
                        <div class="stat-content">
                            <h3 id="partial-fees">0</h3>
                            <p>Partial Fees</p>
                        </div>
                    </div>
                </div>

                <div class="table-container mt-20">
                    <div class="table-wrapper">
                        <table id="fees-table">
                            <thead>
                                <tr>
                                    <th>Student ID</th>
                                    <th>Name</th>
                                    <th>Department</th>
                                    <th>Fees Status</th>
                                    <th>CGPA</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td colspan="6" class="loading">
                                        <i class="fas fa-spinner fa-spin"></i> Loading fees data...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadFeesData();
        });

        async function loadFeesData() {
            try {
                const data = await apiCall('/api/students/pending-fees');
                renderFeesTable(data);
                updateFeesStats(data);
            } catch (error) {
                console.error('Error loading fees data:', error);
                showNotification('Error loading fees data', 'error');
            }
        }

        function renderFeesTable(students) {
            const tbody = document.querySelector('#fees-table tbody');
            tbody.innerHTML = '';
            
            students.forEach(student => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${student.student_id}</td>
                    <td>${student.first_name} ${student.last_name}</td>
                    <td>${student.department}</td>
                    <td><span class="status-badge ${student.fees_status.toLowerCase()}">${student.fees_status}</span></td>
                    <td>${student.cgpa}</td>
                    <td>
                        <button class="btn-primary btn-sm" onclick="viewProfile('${student.student_id}')">
                            <i class="fas fa-eye"></i> View
                        </button>
                    </td>
                `;
            });
        }

        function updateFeesStats(students) {
            const paid = students.filter(s => s.fees_status === 'Paid').length;
            const pending = students.filter(s => s.fees_status === 'Pending').length;
            const partial = students.filter(s => s.fees_status === 'Partial').length;
            
            document.getElementById('paid-fees').textContent = paid;
            document.getElementById('pending-fees').textContent = pending;
            document.getElementById('partial-fees').textContent = partial;
        }
    </script>
</body>
</html>
