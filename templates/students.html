<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students - Student Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-graduation-cap"></i> Student Portal</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="{{ url_for('dashboard') }}" class="nav-link">
                    <i class="fas fa-home"></i> Dashboard
                </a>
                <a href="{{ url_for('students') }}" class="nav-link active">
                    <i class="fas fa-users"></i> Students
                </a>
                <a href="{{ url_for('add_student') }}" class="nav-link">
                    <i class="fas fa-user-plus"></i> Add Student
                </a>
                <a href="{{ url_for('analytics') }}" class="nav-link">
                    <i class="fas fa-chart-line"></i> Analytics
                </a>
                <a href="{{ url_for('fees') }}" class="nav-link">
                    <i class="fas fa-money-bill-wave"></i> Fees
                </a>
                <a href="{{ url_for('assignments') }}" class="nav-link">
                    <i class="fas fa-clipboard-list"></i> Assignments
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Navbar -->
            <header class="top-navbar">
                <div class="navbar-content">
                    <h1>Students</h1>
                    <div class="navbar-actions">
                        <button class="btn" onclick="exportStudentsReport()">
                            <i class="fas fa-download"></i> Export
                        </button>
                        <a href="{{ url_for('add_student') }}" class="btn">
                            <i class="fas fa-plus"></i> Add Student
                        </a>
                        <span class="user-info">
                            <i class="fas fa-user"></i> {{ session.get('username', 'Admin') }}
                        </span>
                        <form method="POST" action="{{ url_for('logout') }}" style="display: inline;">
                            <button type="submit" class="logout-btn">
                                <i class="fas fa-sign-out-alt"></i> Logout
                            </button>
                        </form>
                    </div>
                </div>
            </header>

            <!-- Content -->
            <div class="content">
                <!-- Search and Filters -->
                <div class="filter-section">
                    <div class="search-box">
                        <input type="text" id="search-input" placeholder="Search students...">
                        <button onclick="searchStudents()"><i class="fas fa-search"></i></button>
                    </div>
                    <div class="filter-group">
                        <select id="department-filter">
                            <option value="">All Departments</option>
                        </select>
                        <select id="semester-filter">
                            <option value="">All Semesters</option>
                            <option value="1">1st Semester</option>
                            <option value="2">2nd Semester</option>
                            <option value="3">3rd Semester</option>
                            <option value="4">4th Semester</option>
                            <option value="5">5th Semester</option>
                            <option value="6">6th Semester</option>
                            <option value="7">7th Semester</option>
                            <option value="8">8th Semester</option>
                        </select>
                        <button onclick="clearFilters()">Clear</button>
                    </div>
                </div>

                <!-- Students Table -->
                <div class="table-section">
                    <div class="section-header">
                        <h3>Student List</h3>
                        <span id="total-count" class="count-info">Loading...</span>
                    </div>
                    <div class="table-container">
                        <table id="students-table">
                            <thead>
                                <tr>
                                    <th>Student ID</th>
                                    <th>Name</th>
                                    <th>Department</th>
                                    <th>Semester</th>
                                    <th>CGPA</th>
                                    <th>Attendance</th>
                                    <th>Fees Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td colspan="8" class="loading-row">
                                        <div class="loading"></div>
                                        Loading students...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <!-- Pagination -->
                    <div class="pagination">
                        <button onclick="previousPage()" id="prev-btn" disabled>Previous</button>
                        <span id="page-info">Page 1 of 1</span>
                        <button onclick="nextPage()" id="next-btn" disabled>Next</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Student</h3>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="edit-form">
                    <input type="hidden" id="edit-student-id">
                    <div class="form-group">
                        <label for="edit-first-name">First Name</label>
                        <input type="text" id="edit-first-name" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-last-name">Last Name</label>
                        <input type="text" id="edit-last-name" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-email">Email</label>
                        <input type="email" id="edit-email">
                    </div>
                    <div class="form-group">
                        <label for="edit-phone">Phone</label>
                        <input type="tel" id="edit-phone">
                    </div>
                    <div class="form-group">
                        <label for="edit-department">Department</label>
                        <select id="edit-department" required>
                            <option value="">Select Department</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="edit-semester">Semester</label>
                        <select id="edit-semester" required>
                            <option value="">Select Semester</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                            <option value="7">7</option>
                            <option value="8">8</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="edit-cgpa">CGPA</label>
                        <input type="number" id="edit-cgpa" step="0.01" min="0" max="4" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-attendance">Attendance (%)</label>
                        <input type="number" id="edit-attendance" min="0" max="100" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-fees-status">Fees Status</label>
                        <select id="edit-fees-status" required>
                            <option value="Paid">Paid</option>
                            <option value="Pending">Pending</option>
                            <option value="Partial">Partial</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" onclick="closeModal()" class="btn-secondary">Cancel</button>
                <button type="button" onclick="saveStudent()" class="btn-primary">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script>
        let currentPage = 1;
        let totalPages = 1;

        // Load initial data
        document.addEventListener('DOMContentLoaded', function() {
            loadDepartments();
            loadStudents();
        });

        async function loadDepartments() {
            try {
                const response = await fetch('/api/departments');
                const departments = await response.json();
                
                const deptFilter = document.getElementById('department-filter');
                const editDept = document.getElementById('edit-department');
                
                departments.forEach(dept => {
                    const option1 = new Option(dept, dept);
                    const option2 = new Option(dept, dept);
                    deptFilter.add(option1);
                    editDept.add(option2);
                });
            } catch (error) {
                console.error('Error loading departments:', error);
            }
        }

        async function loadStudents() {
            const search = document.getElementById('search-input').value;
            const department = document.getElementById('department-filter').value;
            const semester = document.getElementById('semester-filter').value;
            
            const params = new URLSearchParams({
                page: currentPage,
                search: search,
                department: department,
                semester: semester
            });

            try {
                const response = await fetch(`/api/students?${params}`);
                const data = await response.json();
                
                displayStudents(data.students);
                updatePagination(data);
                document.getElementById('total-count').textContent = `Total: ${data.total} students`;
            } catch (error) {
                console.error('Error loading students:', error);
                showError('Failed to load students');
            }
        }

        function displayStudents(students) {
            const tbody = document.querySelector('#students-table tbody');
            tbody.innerHTML = '';

            if (!students || students.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="no-data">No students found</td></tr>';
                return;
            }

            students.forEach(student => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${student.student_id}</td>
                    <td>${student.first_name} ${student.last_name}</td>
                    <td>${student.department}</td>
                    <td>${student.semester}</td>
                    <td>${student.cgpa || 'N/A'}</td>
                    <td>${student.attendance_percentage}%</td>
                    <td><span class="status ${student.fees_status.toLowerCase()}">${student.fees_status}</span></td>
                    <td>
                        <button onclick="viewStudent('${student.student_id}')" class="btn-sm" title="View">
                            <i class="fas fa-eye"></i>
                        </button>
                        <button onclick="editStudent('${student.student_id}')" class="btn-sm" title="Edit">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button onclick="deleteStudent('${student.student_id}')" class="btn-sm btn-danger" title="Delete">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function updatePagination(data) {
            totalPages = data.total_pages;
            document.getElementById('page-info').textContent = `Page ${data.page} of ${totalPages}`;
            document.getElementById('prev-btn').disabled = data.page <= 1;
            document.getElementById('next-btn').disabled = data.page >= totalPages;
        }

        function searchStudents() {
            currentPage = 1;
            loadStudents();
        }

        function clearFilters() {
            document.getElementById('search-input').value = '';
            document.getElementById('department-filter').value = '';
            document.getElementById('semester-filter').value = '';
            currentPage = 1;
            loadStudents();
        }

        function previousPage() {
            if (currentPage > 1) {
                currentPage--;
                loadStudents();
            }
        }

        function nextPage() {
            if (currentPage < totalPages) {
                currentPage++;
                loadStudents();
            }
        }

        async function viewStudent(studentId) {
            window.location.href = `/profile?student_id=${studentId}`;
        }

        async function editStudent(studentId) {
            try {
                const response = await fetch(`/api/student/${studentId}`);
                const student = await response.json();
                
                document.getElementById('edit-student-id').value = student.student_id;
                document.getElementById('edit-first-name').value = student.first_name;
                document.getElementById('edit-last-name').value = student.last_name;
                document.getElementById('edit-email').value = student.email || '';
                document.getElementById('edit-phone').value = student.phone || '';
                document.getElementById('edit-department').value = student.department;
                document.getElementById('edit-semester').value = student.semester;
                document.getElementById('edit-cgpa').value = student.cgpa;
                document.getElementById('edit-attendance').value = student.attendance_percentage;
                document.getElementById('edit-fees-status').value = student.fees_status;
                
                document.getElementById('edit-modal').style.display = 'block';
            } catch (error) {
                console.error('Error loading student:', error);
                showError('Failed to load student data');
            }
        }

        async function saveStudent() {
            const studentId = document.getElementById('edit-student-id').value;
            const data = {
                first_name: document.getElementById('edit-first-name').value,
                last_name: document.getElementById('edit-last-name').value,
                email: document.getElementById('edit-email').value,
                phone: document.getElementById('edit-phone').value,
                department: document.getElementById('edit-department').value,
                semester: parseInt(document.getElementById('edit-semester').value),
                cgpa: parseFloat(document.getElementById('edit-cgpa').value),
                attendance_percentage: parseFloat(document.getElementById('edit-attendance').value),
                fees_status: document.getElementById('edit-fees-status').value
            };

            try {
                const response = await fetch(`/api/student/${studentId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    closeModal();
                    loadStudents();
                    showSuccess('Student updated successfully');
                } else {
                    throw new Error('Failed to update student');
                }
            } catch (error) {
                console.error('Error saving student:', error);
                showError('Failed to save student');
            }
        }

        async function deleteStudent(studentId) {
            if (!confirm('Are you sure you want to delete this student?')) {
                return;
            }

            try {
                const response = await fetch(`/api/student/${studentId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    loadStudents();
                    showSuccess('Student deleted successfully');
                } else {
                    throw new Error('Failed to delete student');
                }
            } catch (error) {
                console.error('Error deleting student:', error);
                showError('Failed to delete student');
            }
        }

        function closeModal() {
            document.getElementById('edit-modal').style.display = 'none';
        }

        // Search on Enter key
        document.getElementById('search-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchStudents();
            }
        });

        // Close modal on outside click
        window.onclick = function(event) {
            const modal = document.getElementById('edit-modal');
            if (event.target === modal) {
                closeModal();
            }
        }

        function exportStudentsReport() {
            // Call the global export function with students type
            window.exportReport('students');
        }
    </script>

    <style>
        .filter-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 20px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            flex: 1;
            max-width: 400px;
        }

        .search-box input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .search-box button {
            padding: 10px 15px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .filter-group {
            display: flex;
            gap: 10px;
        }

        .filter-group select, .filter-group button {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: white;
            cursor: pointer;
        }

        .count-info {
            color: #7f8c8d;
            font-size: 14px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }

        .pagination button {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-sm {
            padding: 5px 8px;
            margin: 0 2px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-sm.btn-danger {
            background: #e74c3c;
            color: white;
            border-color: #e74c3c;
        }

        .loading-row {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 0;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #ecf0f1;
        }

        .modal-header h3 {
            margin: 0;
        }

        .close {
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            color: #aaa;
        }

        .close:hover {
            color: #000;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            padding: 20px;
            border-top: 1px solid #ecf0f1;
        }

        @media (max-width: 768px) {
            .filter-section {
                flex-direction: column;
                align-items: stretch;
            }
            
            .search-box {
                max-width: none;
            }
            
            .filter-group {
                flex-wrap: wrap;
            }
        }
    </style>
</body>
</html>
